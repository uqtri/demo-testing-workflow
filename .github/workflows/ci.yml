name: API Test from Postman Cloud

on:
  push:
    branches: [main]

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # ⚙️ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 📦 Install dependencies
      - name: Install dependencies
        run: npm install

      # 🚀 Start server (chạy background)
      - name: Start server
        run: |
          nohup npm start > server.log 2>&1 &

      # ⏳ Chờ server khởi động
      - name: Wait for server (sleep)
        run: sleep 5

      # 🔍 Debug (rất hữu ích nếu fail)
      - name: Debug server
        run: |
          echo "=== SERVER LOG ==="
          cat server.log || true
          echo "=== CURL TEST ==="
          curl http://localhost:3000 || true
          echo "=== PROCESS LIST ==="
          ps aux | grep node

      # 📥 Download Postman collection từ cloud
      - name: Download Postman collection
        run: |
          curl -X GET "https://api.getpostman.com/collections/${{secrets.COLLECTION_UID}}" \
          -H "X-Api-Key: ${{ secrets.POSTMAN_API_KEY }}" \
          > collection.json

      # 🧪 Run test bằng Newman
      - name: Run Newman
        run: |
          npx newman run collection.json
