name: API Test from Postman Cloud

on:
  push:
    branches: [main]

jobs:
  api-test:
    runs-on: ubuntu-latest

    env:
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      COLLECTION_UID: ${{ secrets.COLLECTION_UID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install wait-on
        run: npm install -g wait-on

      - name: Start server
        run: |
          nohup npm start > server.log 2>&1 &

      - name: Wait for server
        run: wait-on http://localhost:3000

      - name: Download Postman collection
        run: |
          curl -X GET "https://api.getpostman.com/collections/$COLLECTION_UID" \
          -H "X-Api-Key: $POSTMAN_API_KEY" \
          -o collection.json

      - name: Run Newman
        run: |
          npx newman run collection.json --bail
