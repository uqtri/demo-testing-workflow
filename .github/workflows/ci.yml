name: API Test from Postman Cloud

on:
  push:
    branches: [main]

jobs:
  api-test:
    runs-on: ubuntu-latest

    env:
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      COLLECTION_UID: ${{ secrets.COLLECTION_UID }}

    steps:
      # 📥 Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # ⚙️ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 📦 Install dependencies
      - name: Install dependencies
        run: npm install

      # 🚀 Start server
      - name: Start server
        run: |
          nohup npm start > server.log 2>&1 &

      # ⏳ Wait until server is ready (không dùng sleep cứng)
      - name: Wait for server
        run: |
          for i in {1..15}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "✅ Server is up"
              break
            fi
            echo "⏳ Waiting for server..."
            sleep 2
          done

      # 🔍 Debug (cực quan trọng nếu fail)
      - name: Debug server
        run: |
          echo "=== SERVER LOG ==="
          cat server.log || true

          echo "=== CHECK PORT 3000 ==="
          ss -ltnp | grep 3000 || true

          echo "=== CURL TEST ==="
          curl http://localhost:3000 || true

          echo "=== PROCESS ==="
          ps aux | grep node

      # 📥 Download collection từ Postman
      - name: Download Postman collection
        run: |
          curl -X GET "https://api.getpostman.com/collections/$COLLECTION_UID" \
          -H "X-Api-Key: $POSTMAN_API_KEY" \
          -o collection.json

          echo "=== COLLECTION PREVIEW ==="
          cat collection.json

      # 🧪 Run Newman test
      - name: Run Newman
        run: |
          npx newman run collection.json \
            --env-var base_url=http://localhost:3000 \
            --bail \
            --verbose
