name: API Test from Postman Cloud

on:
  push:
    branches: [main]

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # 🔥 Start server
      - name: Start server
        run: npm start &

      # ⏳ Wait for server
      - name: Wait for server
        run: npx wait-on http://localhost:3000

      # 📥 Fetch Postman collection from cloud
      - name: Download Postman collection
        run: |
          curl -X GET "https://api.getpostman.com/collections/{{COLLECTION_UID}}" \
          -H "X-Api-Key: ${{ secrets.POSTMAN_API_KEY }}" \
          > collection.json

      # 🧪 Run tests
      - name: Run Newman
        run: |
          npx newman run collection.json
